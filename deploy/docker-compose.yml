version: "3.8"

services:
  ana-db:
    container_name: ana-db
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ana_hrm
      POSTGRES_USER: ana_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - ana-pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ana_user -d ana_hrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  ana-backend:
    container_name: ana-backend
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    ports:
      - "5002:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://ana_user:${DB_PASSWORD:-change_me_in_production}@ana-db:5432/ana_hrm
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      ana-db:
        condition: service_healthy
    networks:
      - default
      - auditwise_auditwise
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  auditwise_auditwise:
    external: true

volumes:
  ana-pgdata:
