name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1

jobs:
  deploy:
    name: Build & Deploy to ana-ca.com
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy
          chmod 600 ~/.ssh/vps_deploy
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -T 10 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keygen -l -f ~/.ssh/vps_deploy
          echo "SSH key ready"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/vps_deploy \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -p "$VPS_PORT" \
              "$VPS_USER@$VPS_HOST" bash -s << 'ENDSSH'
          set -e
          APP_DIR=~/firm-hrm
          DEPLOY_DIR="$APP_DIR/deploy"

          # Clone on first deploy, pull on subsequent
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "[VPS] Cloning repository..."
            git clone https://github.com/aqeelalamfca-sys/firm-hrm.git "$APP_DIR"
          else
            echo "[VPS] Pulling latest code..."
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
          fi

          cd "$APP_DIR"
          echo "[VPS] Commit: $(git log --oneline -1)"

          # Ensure .env exists
          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            echo "[VPS] WARNING: $DEPLOY_DIR/.env not found — copying .env.example"
            cp "$DEPLOY_DIR/.env.example" "$DEPLOY_DIR/.env"
            echo "[VPS] ACTION REQUIRED: Edit $DEPLOY_DIR/.env with real credentials"
          fi

          # Ensure required Docker network exists
          docker network create auditwise_auditwise 2>/dev/null || echo "[VPS] Docker network already exists"

          # Build and restart backend container only (db is persistent)
          cd "$DEPLOY_DIR"
          echo "[VPS] Building ana-backend..."
          docker compose --env-file .env build --no-cache ana-backend
          docker compose --env-file .env up -d --force-recreate --no-deps ana-backend

          # Health check loop (40s max)
          echo "[VPS] Waiting for health..."
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf http://localhost:5002/api/health > /dev/null 2>&1; then
              echo "[VPS] Backend healthy after ${i}x5s"
              break
            fi
            [ $i -eq 8 ] && echo "[VPS] WARNING: health check timed out" && break
            echo "[VPS] Attempt $i/8, waiting 5s..."
            sleep 5
          done

          echo "[VPS] Container status:"
          docker ps --filter "name=ana-" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo "[VPS] Deploy complete!"
          ENDSSH

      - name: Verify live site
        run: |
          sleep 8
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 https://ana-ca.com/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Live site healthy — https://ana-ca.com responds 200"
          else
            echo "Note: Live check returned HTTP $STATUS (DNS/SSL may still be propagating)"
          fi
