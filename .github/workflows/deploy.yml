name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          node -e "
          const key = process.env.VPS_SSH_KEY;
          let fixed = key.trim();
          if (!fixed.includes('\n')) {
            fixed = fixed
              .replace('-----BEGIN OPENSSH PRIVATE KEY----- ', '-----BEGIN OPENSSH PRIVATE KEY-----\n')
              .replace(' -----END OPENSSH PRIVATE KEY-----', '\n-----END OPENSSH PRIVATE KEY-----');
            const lines = fixed.split('\n');
            const result = [];
            for (const line of lines) {
              if (line.startsWith('-----')) {
                result.push(line);
              } else {
                const body = line.replace(/ /g, '');
                for (let i = 0; i < body.length; i += 64) result.push(body.slice(i, i+64));
              }
            }
            fixed = result.join('\n') + '\n';
          }
          require('fs').writeFileSync(process.env.HOME + '/.ssh/vps_key', fixed, { mode: 0o600 });
          console.log('SSH key written');
          "
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keygen -l -f ~/.ssh/vps_key
          echo "SSH key ready"

      - name: Deploy to VPS via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/vps_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -p "$VPS_PORT" \
              "$VPS_USER@$VPS_HOST" bash -s << 'ENDSSH'
          set -e
          APP_DIR=~/firm-hrm
          DEPLOY_DIR="$APP_DIR/deploy"

          if [ ! -d "$APP_DIR" ]; then
            echo "Cloning repository..."
            git clone https://github.com/aqeelalamfca-sys/firm-hrm.git "$APP_DIR"
          fi

          cd "$APP_DIR"
          echo "Pulling latest code..."
          git fetch origin main
          git merge origin/main --ff-only

          echo "Code: $(git log --oneline -1)"

          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            cp "$DEPLOY_DIR/.env.example" "$DEPLOY_DIR/.env"
          fi

          cd "$DEPLOY_DIR"
          echo "Building ana-backend..."
          docker compose --env-file .env build --no-cache ana-backend
          docker compose --env-file .env up -d --force-recreate ana-backend

          echo "Waiting for health..."
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf http://localhost:5002/api/health > /dev/null 2>&1; then
              echo "Backend healthy!"
              break
            fi
            echo "Attempt $i/8..."
            sleep 5
          done

          docker ps --filter "name=ana-" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          curl -sf http://localhost:5002/api/health && echo ""
          echo "Deploy complete!"
          ENDSSH

      - name: Verify live site
        run: |
          sleep 5
          curl -sf --max-time 15 https://ana-ca.com/api/health && echo "Live site OK" || echo "Live check skipped"
