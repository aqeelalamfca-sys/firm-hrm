kind = "web"
previewPath = "/"
title = "HRM & Invoice Management System"
version = "1.0.0"
id = "artifacts/hrm-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/hrm-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hrm-system", "run", "build" ]
publicDir = "artifacts/hrm-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
API_PORT = "5000"
