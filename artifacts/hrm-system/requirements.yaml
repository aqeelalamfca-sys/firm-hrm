packages:
  "recharts": "For dashboard analytics charts"
  "date-fns": "For formatting dates in tables and forms"
  "framer-motion": "For smooth page transitions and micro-interactions"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation in forms"
  "zod": "For form validation schemas"
  "clsx": "For conditional class names"
  "tailwind-merge": "For merging tailwind classes safely"
  "@tanstack/react-query": "Already in stack, but ensuring compatibility"

images:
  - path: "artifacts/hrm-system/public/images/login-bg.png"
    description: "Abstract, elegant, professional geometric background in deep navy blue and slate grey tones, suitable for an enterprise corporate login page"
    aspect_ratio: "16:9"
  - path: "artifacts/hrm-system/public/images/logo-icon.png"
    description: "Minimalist, professional logo icon for a financial or HR corporate system, deep blue and silver geometric overlapping shapes on transparent background"
    aspect_ratio: "1:1"

notes:
  - Using generated Orval React Query hooks from @workspace/api-client-react for all API interactions.
  - Custom JWT AuthContext implemented to handle localStorage token and attach to requests if customFetch doesn't do it automatically.
  - Relying on existing shadcn/ui components in src/components/ui/
